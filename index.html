<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ferien Kasse 🌴</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue: #1A3C5E;
    --yellow: #F5C842;
    --sand: #FDF6E3;
    --coral: #FF6B6B;
    --teal: #2ABFBF;
    --white: #FFFFFF;
    --gray: #6B7280;
    --light: #F0F4F8;
    --green: #22C55E;
    --red: #EF4444;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--sand);
    min-height: 100vh;
    color: var(--blue);
  }

  /* HEADER */
  header {
    background: var(--blue);
    padding: 20px 24px 0;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header h1 {
    font-family: 'Pacifico', cursive;
    font-size: 2.2rem;
    color: var(--yellow);
    letter-spacing: 1px;
    position: relative;
    z-index: 2;
  }
  header p.subtitle {
    color: #A8C6E8;
    font-size: 0.85rem;
    margin-top: 4px;
    position: relative;
    z-index: 2;
  }
  .wave-divider {
    display: block; width: 100%; margin-top: 16px;
    line-height: 0; position: relative; z-index: 2;
  }

  /* SYNC INDICATOR */
  #syncStatus {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    font-size: 0.75rem; color: #A8C6E8; margin-top: 4px;
    position: relative; z-index: 2;
  }
  #syncDot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--gray); flex-shrink: 0;
    transition: background 0.3s;
  }
  #syncDot.connected { background: var(--green); }
  #syncDot.syncing { background: var(--yellow); animation: pulse 0.8s infinite; }
  #syncDot.error { background: var(--coral); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* TABS */
  .tabs {
    display: flex; justify-content: center; gap: 8px;
    padding: 20px 16px 0; background: var(--sand);
  }
  .tab-btn {
    padding: 10px 22px; border-radius: 50px;
    border: 2px solid var(--blue); background: transparent;
    color: var(--blue); font-family: 'Inter', sans-serif;
    font-weight: 600; font-size: 0.88rem; cursor: pointer;
    transition: all 0.2s; white-space: nowrap;
  }
  .tab-btn.active, .tab-btn:hover { background: var(--blue); color: var(--yellow); }

  main { max-width: 680px; margin: 0 auto; padding: 24px 16px 80px; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  .section-title {
    font-family: 'Pacifico', cursive; font-size: 1.4rem;
    color: var(--blue); margin-bottom: 16px;
  }

  .card {
    background: var(--white); border-radius: 16px;
    padding: 20px; box-shadow: 0 2px 12px rgba(26,60,94,0.08);
    margin-bottom: 16px;
  }

  /* AVATAR GRID */
  .avatar-grid {
    display: grid; grid-template-columns: repeat(5, 1fr);
    gap: 10px; margin: 12px 0;
  }
  .avatar-option {
    display: flex; flex-direction: column; align-items: center;
    cursor: pointer; padding: 6px 4px; border-radius: 12px;
    border: 2px solid transparent; transition: all 0.15s;
    background: var(--light);
  }
  .avatar-option:hover { border-color: var(--teal); background: #E0F7F7; }
  .avatar-option.selected { border-color: var(--yellow); background: #FFF8E1; box-shadow: 0 0 0 2px var(--blue); }
  .avatar-option .emoji { font-size: 1.8rem; }
  .avatar-option .label { font-size: 0.6rem; color: var(--gray); margin-top: 3px; text-align: center; }

  /* FORM ELEMENTS */
  label { font-size: 0.85rem; font-weight: 600; color: var(--blue); display: block; margin-bottom: 5px; }
  input[type="text"], input[type="number"], select, textarea {
    width: 100%; padding: 10px 14px; border: 2px solid #D1DCE8;
    border-radius: 10px; font-family: 'Inter', sans-serif;
    font-size: 0.9rem; color: var(--blue); background: var(--light);
    outline: none; transition: border-color 0.2s; margin-bottom: 14px;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--teal); background: #fff; }

  .btn {
    padding: 11px 24px; border-radius: 50px; border: none;
    font-family: 'Inter', sans-serif; font-weight: 700;
    font-size: 0.9rem; cursor: pointer; transition: all 0.2s;
  }
  .btn-primary { background: var(--blue); color: var(--yellow); }
  .btn-primary:hover { background: #0f2840; transform: translateY(-1px); }
  .btn-sm { padding: 6px 14px; font-size: 0.78rem; }

  /* USER LIST */
  .user-list { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 16px; }
  .user-chip {
    display: flex; align-items: center; gap: 8px;
    background: var(--light); border: 2px solid #D1DCE8;
    border-radius: 50px; padding: 6px 14px 6px 6px;
    font-weight: 600; font-size: 0.85rem;
  }
  .user-chip .chip-avatar { font-size: 1.4rem; }
  .user-chip .chip-delete { margin-left: 6px; color: var(--coral); cursor: pointer; font-size: 1rem; font-weight: 700; }

  /* EXPENSE LIST */
  .expense-card {
    background: var(--white); border-radius: 14px;
    padding: 16px; box-shadow: 0 2px 10px rgba(26,60,94,0.07);
    margin-bottom: 12px; border-left: 5px solid var(--teal);
    display: flex; flex-direction: column; gap: 6px;
  }
  .expense-header { display: flex; justify-content: space-between; align-items: flex-start; }
  .expense-title { font-weight: 700; font-size: 1rem; color: var(--blue); }
  .expense-amount { font-family: 'Pacifico', cursive; font-size: 1.1rem; color: var(--coral); white-space: nowrap; }
  .expense-meta { font-size: 0.78rem; color: var(--gray); }
  .expense-participants { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 4px; }
  .participant-badge {
    background: var(--light); border-radius: 20px; padding: 2px 10px;
    font-size: 0.72rem; font-weight: 600; color: var(--blue);
    display: flex; align-items: center; gap: 3px;
  }

  /* CHECKBOXES */
  .checkbox-group { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
  .checkbox-item {
    display: flex; align-items: center; gap: 6px;
    background: var(--light); border: 2px solid #D1DCE8;
    border-radius: 8px; padding: 6px 12px; cursor: pointer;
    font-size: 0.82rem; font-weight: 600; transition: all 0.15s; user-select: none;
  }
  .checkbox-item input { display: none; }
  .checkbox-item.checked { border-color: var(--teal); background: #E0F7F7; }
  .checkbox-item .cb-avatar { font-size: 1.1rem; }

  /* SETTLEMENT */
  .settlement-card {
    background: var(--white); border-radius: 14px; padding: 18px;
    box-shadow: 0 2px 10px rgba(26,60,94,0.07); margin-bottom: 10px;
    display: flex; align-items: center; gap: 14px;
  }
  .settlement-card .s-amount {
    font-family: 'Pacifico', cursive; font-size: 1.2rem;
    color: var(--coral); margin-left: auto; white-space: nowrap;
  }
  .settlement-names { font-size: 0.9rem; font-weight: 600; color: var(--blue); }
  .settlement-names span { color: var(--gray); font-weight: 400; }

  .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--light); }
  .stat-row:last-child { border-bottom: none; }
  .stat-label { font-size: 0.85rem; color: var(--gray); }
  .stat-value { font-weight: 700; font-size: 1rem; }

  .balance-bar-wrap { margin: 8px 0 4px; }
  .balance-bar-bg { background: var(--light); border-radius: 20px; height: 10px; overflow: hidden; }
  .balance-bar-fill { height: 100%; border-radius: 20px; transition: width 0.5s; }

  .person-balance {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 0; border-bottom: 1px solid var(--light); gap: 10px;
  }
  .person-balance:last-child { border-bottom: none; }
  .pb-name { display: flex; align-items: center; gap: 8px; font-weight: 600; }
  .pb-avatar { font-size: 1.4rem; }
  .pb-paid { font-size: 0.78rem; color: var(--gray); }
  .pb-balance { font-weight: 700; font-size: 0.95rem; }
  .pb-pos { color: var(--green); }
  .pb-neg { color: var(--red); }
  .pb-zero { color: var(--gray); }

  .empty-state { text-align: center; padding: 40px 20px; color: var(--gray); }
  .empty-state .es-icon { font-size: 3rem; margin-bottom: 10px; }
  .empty-state p { font-size: 0.9rem; }

  /* TOAST */
  #toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--blue); color: var(--yellow);
    padding: 12px 28px; border-radius: 50px;
    font-weight: 600; font-size: 0.9rem;
    box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 999; pointer-events: none; white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  /* MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.45); z-index: 500;
    align-items: center; justify-content: center; padding: 16px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--white); border-radius: 20px;
    padding: 28px; width: 100%; max-width: 480px;
    max-height: 90vh; overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    animation: modalIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes modalIn { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .modal-title { font-family: 'Pacifico', cursive; font-size: 1.3rem; margin-bottom: 20px; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 8px; }

  /* LOADING OVERLAY */
  #loadingOverlay {
    position: fixed; inset: 0; background: var(--blue);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 9999; transition: opacity 0.5s;
  }
  #loadingOverlay.hidden { opacity: 0; pointer-events: none; }
  #loadingOverlay h2 { font-family: 'Pacifico', cursive; color: var(--yellow); font-size: 2rem; margin-bottom: 12px; }
  #loadingOverlay p { color: #A8C6E8; font-size: 0.9rem; }
  .spinner {
    width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.2);
    border-top-color: var(--yellow); border-radius: 50%;
    animation: spin 0.8s linear infinite; margin-bottom: 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 480px) {
    header h1 { font-size: 1.6rem; }
    .avatar-grid { grid-template-columns: repeat(4, 1fr); }
    .tab-btn { padding: 8px 14px; font-size: 0.8rem; }
  }
</style>
</head>
<body>

<!-- LOADING SCREEN -->
<div id="loadingOverlay">
  <h2>🌴 FerienKasse</h2>
  <div class="spinner"></div>
  <p>Verbinde mit Firebase...</p>
</div>

<header>
  <h1>🌴 FerienKasse</h1>
  <p class="subtitle">Gemeinsam reisen, fair abrechnen</p>
  <div id="syncStatus">
    <div id="syncDot"></div>
    <span id="syncText">Verbinde...</span>
  </div>
  <svg class="wave-divider" viewBox="0 0 900 48" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
    <path d="M0,28 C150,56 300,0 450,28 C600,56 750,0 900,28 L900,48 L0,48 Z" fill="#FDF6E3"/>
  </svg>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('gruppe')">👥 Gruppe</button>
  <button class="tab-btn" onclick="switchTab('ausgaben')">🧾 Ausgaben</button>
  <button class="tab-btn" onclick="switchTab('abrechnung')">📊 Abrechnung</button>
</div>

<main>
  <!-- TAB: GRUPPE -->
  <div id="tab-gruppe" class="tab-panel active">
    <h2 class="section-title">Deine Reisegruppe</h2>
    <div class="card">
      <label>Reise-Titel</label>
      <input type="text" id="tripTitle" placeholder="z.B. Italy 2026" oninput="saveTripTitle()"/>
      <div id="userList" class="user-list"></div>
      <button class="btn btn-primary" onclick="openAddUser()">＋ Person hinzufügen</button>
    </div>
  </div>

  <!-- TAB: AUSGABEN -->
  <div id="tab-ausgaben" class="tab-panel">
    <h2 class="section-title">Ausgaben</h2>
    <div class="card">
      <button class="btn btn-primary" style="width:100%" onclick="openAddExpense()">＋ Ausgabe eintragen</button>
    </div>
    <div id="expenseList"></div>
  </div>

  <!-- TAB: ABRECHNUNG -->
  <div id="tab-abrechnung" class="tab-panel">
    <h2 class="section-title">Abrechnung</h2>
    <div id="settlementContent"></div>
  </div>
</main>
<!-- MODAL: Person bearbeiten -->
<div class="modal-overlay" id="modalEditUser">
  <div class="modal">
    <div class="modal-title">✏️ Person bearbeiten</div>
    <label>Name</label>
    <input type="text" id="editUserName" placeholder="z.B. Anna" maxlength="20"/>
    <label>Avatar auswählen</label>
    <div class="avatar-grid" id="editAvatarGrid"></div>
    <div class="modal-actions">
      <button class="btn btn-sm" onclick="closeModal('modalEditUser')" style="background:var(--light);color:var(--blue)">Abbrechen</button>
      <button class="btn btn-primary btn-sm" onclick="saveEditUser()">Speichern</button>
    </div>
  </div>
</div>
<!-- MODAL: User hinzufügen -->
<div class="modal-overlay" id="modalUser">
  <div class="modal">
    <div class="modal-title">✨ Person anlegen</div>
    <label>Name</label>
    <input type="text" id="newUserName" placeholder="z.B. Anna" maxlength="20"/>
    <label>Avatar auswählen</label>
    <div class="avatar-grid" id="avatarGrid"></div>
    <div class="modal-actions">
      <button class="btn btn-sm" onclick="closeModal('modalUser')" style="background:var(--light);color:var(--blue)">Abbrechen</button>
      <button class="btn btn-primary btn-sm" onclick="addUser()">Person anlegen</button>
    </div>
  </div>
</div>

<!-- MODAL: Ausgabe eintragen -->
<div class="modal-overlay" id="modalExpense">
  <div class="modal">
    <div class="modal-title">💸 Ausgabe eintragen</div>
    <label>Beschreibung</label>
    <input type="text" id="expTitle" placeholder="z.B. Abendessen am Strand"/>
    <label>Betrag (CHF)</label>
    <input type="number" id="expAmount" placeholder="0.00" min="0" step="0.01"/>
    <label>Bezahlt von</label>
    <select id="expPayer"></select>
    <label>Betroffen (wer teilt die Kosten?)</label>
    <div class="checkbox-group" id="expParticipants"></div>
    <div style="display:flex;gap:8px;margin-bottom:14px;">
      <button class="btn btn-sm" style="background:var(--light);color:var(--blue)" onclick="selectAllParticipants()">Alle</button>
      <button class="btn btn-sm" style="background:var(--light);color:var(--blue)" onclick="clearAllParticipants()">Keine</button>
    </div>
    <label>Kategorie</label>
    <select id="expCategory">
      <option value="🍽️ Essen & Trinken">🍽️ Essen & Trinken</option>
      <option value="🏨 Unterkunft">🏨 Unterkunft</option>
      <option value="🚗 Transport">🚗 Transport</option>
      <option value="🎡 Aktivitäten">🎡 Aktivitäten</option>
      <option value="🛒 Einkaufen">🛒 Einkaufen</option>
      <option value="🎁 Sonstiges">🎁 Sonstiges</option>
    </select>
    <label>Datum</label>
    <input type="date" id="expDate"/>
    <div class="modal-actions">
      <button class="btn btn-sm" onclick="closeModal('modalExpense')" style="background:var(--light);color:var(--blue)">Abbrechen</button>
      <button class="btn btn-primary btn-sm" onclick="addExpense()">Eintragen</button>
    </div>
  </div>
</div>
<!-- MODAL: Ausgabe bearbeiten -->
<div class="modal-overlay" id="modalEditExpense">
  <div class="modal">
    <div class="modal-title">✏️ Ausgabe bearbeiten</div>
    <label>Beschreibung</label>
    <input type="text" id="editExpTitle" placeholder="z.B. Abendessen am Strand"/>
    <label>Betrag (CHF)</label>
    <input type="number" id="editExpAmount" placeholder="0.00" min="0" step="0.01"/>
    <label>Bezahlt von</label>
    <select id="editExpPayer"></select>
    <label>Betroffen (wer teilt die Kosten?)</label>
    <div class="checkbox-group" id="editExpParticipants"></div>
    <div style="display:flex;gap:8px;margin-bottom:14px;">
      <button class="btn btn-sm" style="background:var(--light);color:var(--blue)" onclick="editSelectAll()">Alle</button>
      <button class="btn btn-sm" style="background:var(--light);color:var(--blue)" onclick="editClearAll()">Keine</button>
    </div>
    <label>Kategorie</label>
    <select id="editExpCategory">
      <option value="🍽️ Essen & Trinken">🍽️ Essen & Trinken</option>
      <option value="🏨 Unterkunft">🏨 Unterkunft</option>
      <option value="🚗 Transport">🚗 Transport</option>
      <option value="🎡 Aktivitäten">🎡 Aktivitäten</option>
      <option value="🛒 Einkaufen">🛒 Einkaufen</option>
      <option value="🎁 Sonstiges">🎁 Sonstiges</option>
    </select>
    <label>Datum</label>
    <input type="date" id="editExpDate"/>
    <div class="modal-actions">
      <button class="btn btn-sm" onclick="closeModal('modalEditExpense')" style="background:var(--light);color:var(--blue)">Abbrechen</button>
      <button class="btn btn-primary btn-sm" onclick="saveEditExpense()">Speichern</button>
    </div>
  </div>
</div>
<div id="toast"></div>

<!-- ═══════════════════════════════════════════════════════════
     FIREBASE SDK  (über CDN – kein Build-Schritt nötig)
     ═══════════════════════════════════════════════════════════ -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
  import { getDatabase, ref, set, push, remove, onValue, update }
    from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";

  // ┌─────────────────────────────────────────────────────────┐
  // │  ⚙️  HIER DEINEN FIREBASE CONFIG EINFÜGEN              │
  // │  (Projekteinstellungen → Allgemein → Meine Apps → </>) │
  // └─────────────────────────────────────────────────────────┘
  const firebaseConfig = {
    apiKey:            "AIzaSyAf2Y1zD9mlNkplNSIEc1K8IWmW23XdRmA",
    authDomain:        "italy-26-c5e1c.firebaseapp.com",
    databaseURL:       "https://italy-26-c5e1c-default-rtdb.europe-west1.firebasedatabase.app",
    projectId:         "italy-26-c5e1c",
    storageBucket:     "italy-26-c5e1c.firebasestorage.app",
    messagingSenderId: "865948395005",
    appId:             "1:865948395005:web:db454426d9cba012d8a594"
  };

  // ─── FIREBASE INITIALISIEREN ──────────────────────────────
  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  // ─── AVATARE ──────────────────────────────────────────────
  const AVATARS = [
    { emoji: '🦄', label: 'Einhorn' },   { emoji: '🐙', label: 'Oktopus' },
    { emoji: '🦊', label: 'Fuchs' },     { emoji: '🐻‍❄️', label: 'Eisbär' },
    { emoji: '🦩', label: 'Flamingo' },  { emoji: '🐉', label: 'Drache' },
    { emoji: '🦋', label: 'Schmett.' },  { emoji: '🐧', label: 'Pinguin' },
    { emoji: '🦁', label: 'Löwe' },      { emoji: '🐸', label: 'Frosch' },
    { emoji: '🦀', label: 'Krabbe' },    { emoji: '🐺', label: 'Wolf' },
    { emoji: '🦚', label: 'Pfau' },      { emoji: '🐼', label: 'Panda' },
    { emoji: '🦝', label: 'Waschbär' },  { emoji: '🐳', label: 'Wal' },
    { emoji: '🦜', label: 'Papagei' },   { emoji: '🐨', label: 'Koala' },
    { emoji: '🦭', label: 'Robbe' },     { emoji: '🦖', label: 'Dino' },
    { emoji: '🐬', label: 'Delphin' },   { emoji: '🦦', label: 'Otter' },
  ];

  // ─── STATE (wird von Firebase befüllt) ────────────────────
  let users    = {};   // { firebaseKey: { name, avatarEmoji, avatarLabel } }
  let expenses = {};   // { firebaseKey: { title, amount, payerId, participants, category, date } }
  let selectedAvatar = AVATARS[0];

  // ─── SYNC STATUS ──────────────────────────────────────────
  function setSyncStatus(state, text) {
    const dot  = document.getElementById('syncDot');
    const span = document.getElementById('syncText');
    dot.className = state;   // connected | syncing | error | ''
    span.textContent = text;
  }

  // ─── FIREBASE LISTENERS ───────────────────────────────────
  // Reise-Titel
  onValue(ref(db, 'tripTitle'), snap => {
    const t = snap.val() || '';
    document.getElementById('tripTitle').value = t;
    document.title = (t ? t + ' · ' : '') + 'FerienKasse 🌴';
  });

  // Personen
  onValue(ref(db, 'users'), snap => {
    users = snap.val() || {};
    renderUserList();
    renderExpenseList();
  });

  // Ausgaben
  onValue(ref(db, 'expenses'), snap => {
    expenses = snap.val() || {};
    renderExpenseList();
    if (document.getElementById('tab-abrechnung').classList.contains('active'))
      renderSettlement();
    // Ladescreen verstecken sobald Daten da
    hideLoader();
  }, err => {
    setSyncStatus('error', 'Verbindungsfehler!');
    hideLoader();
  });

  // Verbindungsstatus
  onValue(ref(db, '.info/connected'), snap => {
    if (snap.val() === true) {
      setSyncStatus('connected', 'Live synchronisiert ✓');
    } else {

// ─── DATUM HILFSFUNKTIONEN ────────────────────────────────
// Heutiges Datum im Format YYYY-MM-DD (für input type="date")
function todayISO() {
  const d = new Date();
  return d.toISOString().slice(0, 10);
}

// Datum von YYYY-MM-DD → "Sa, 18.07.2026"
function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso + 'T00:00:00');
  const days = ['So', 'Mo', 'Di', 'Mi', 'Do', 'Fr', 'Sa'];
  const dd  = String(d.getDate()).padStart(2, '0');
  const mm  = String(d.getMonth() + 1).padStart(2, '0');
  const yyyy = d.getFullYear();
  return `${days[d.getDay()]}, ${dd}.${mm}.${yyyy}`;
}

  function renderExpenseList() {

      el.innerHTML = `<div class="empty-state"><div class="es-icon">🧾</div><p>Noch keine Ausgaben.<br/>Tippe auf <strong>＋ Ausgabe eintragen</strong>!</p></div>`;
      return;
    }
    // Neueste zuerst
    list.sort((a,b) => (b[1].createdAt||0) - (a[1].createdAt||0));
    el.innerHTML = list.map(([id, exp]) => {
      const payer = users[exp.payerId];
      const participantIds = exp.participants ? Object.keys(exp.participants) : [];

      const perPerson = (exp.amount / count).toFixed(2);
      const partBadges = participantIds.map(pid => {
        const u = users[pid];
        return u ? `<span class="participant-badge">${u.avatarEmoji} ${u.name}</span>` : '';
      }).join('');
      return `
        <div class="expense-card">
          <div class="expense-header">
            <div>
              <div class="expense-title">${exp.category} ${exp.title}</div>
              <div class="expense-meta">${exp.date ? formatDate(exp.date) + ' · ' : ''}Bezahlt von ${payer ? payer.avatarEmoji + ' ' + payer.name : '?'} · CHF ${perPerson} / Person</div>
            </div>
            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
              <div class="expense-amount">CHF ${Number(exp.amount).toFixed(2)}</div>
              <button class="btn btn-sm" onclick="openEditExpense('${id}')" style="background:var(--light);color:var(--teal);padding:4px 10px;">✏️</button>
              <button class="btn btn-sm" onclick="removeExpense('${id}')" style="background:var(--light);color:var(--coral);padding:4px 10px;">🗑️</button>
            </div>
          </div>
          <div class="expense-participants">${partBadges}</div>
        </div>`;
    }).join('');
  }

  // ─── ABRECHNUNG ───────────────────────────────────────────
  function calcBalances() {
    const paid  = {};
    const share = {};
    Object.keys(users).forEach(id => { paid[id] = 0; share[id] = 0; });

    Object.values(expenses).forEach(exp => {
      if (paid[exp.payerId] !== undefined) paid[exp.payerId] += Number(exp.amount);
      const participantIds = exp.participants ? Object.keys(exp.participants) : [];
      const perPerson = Number(exp.amount) / (participantIds.length || 1);
      participantIds.forEach(pid => {
        if (share[pid] !== undefined) share[pid] += perPerson;
      });
    });

    const balances = {};
    Object.keys(users).forEach(id => { balances[id] = paid[id] - share[id]; });
    return { balances, paid, share };
  }

  function calcSettlements(balances) {
    const pos = [], neg = [];
    Object.keys(users).forEach(id => {
      const b = balances[id];
      if (b > 0.005) pos.push({ id, amt: b });
      else if (b < -0.005) neg.push({ id, amt: -b });
    });
    pos.sort((a,b) => b.amt - a.amt);
    neg.sort((a,b) => b.amt - a.amt);

    const transactions = [];
    let pi = 0, ni = 0;
    while (pi < pos.length && ni < neg.length) {
      const transfer = Math.min(pos[pi].amt, neg[ni].amt);
      transactions.push({ from: neg[ni].id, to: pos[pi].id, amount: transfer });
      pos[pi].amt -= transfer;
      neg[ni].amt -= transfer;
      if (pos[pi].amt < 0.005) pi++;
      if (neg[ni].amt < 0.005) ni++;
    }
    return transactions;
  }

  function renderSettlement() {
    const el = document.getElementById('settlementContent');
    const userList = Object.entries(users);
    const expList  = Object.values(expenses);

    if (userList.length === 0 || expList.length === 0) {
      el.innerHTML = `<div class="empty-state"><div class="es-icon">📊</div><p>Trage zuerst Personen und Ausgaben ein.</p></div>`;
      return;
    }

    const { balances, paid, share } = calcBalances();
    const transactions = calcSettlements(balances);
    const totalSpent  = expList.reduce((s, e) => s + Number(e.amount), 0);

    // Gesamtanteil aller Beteiligungen (Summe aller share-Werte)
    const totalShare = Object.values(share).reduce((s, v) => s + v, 0);

    let html = `<div class="card">
      <div class="stat-row"><span class="stat-label">💰 Gesamtausgaben</span><span class="stat-value">CHF ${totalSpent.toFixed(2)}</span></div>
      <div class="stat-row"><span class="stat-label">👥 Personen in Gruppe</span><span class="stat-value">${userList.length}</span></div>
      <div class="stat-row"><span class="stat-label">📋 Anzahl Ausgaben</span><span class="stat-value">${expList.length}</span></div>
    </div>`;

    html += `<h3 style="font-weight:700;margin:20px 0 10px;font-size:1rem;">📋 Personen-Bilanz</h3><div class="card">`;

    // Balken: relativ zum grössten share-Wert unter allen Personen
    const maxShare = Math.max(...userList.map(([id]) => share[id]), 1);

    userList.forEach(([id, u]) => {
      const b    = balances[id];
      const cls  = b > 0.005 ? 'pb-pos' : b < -0.005 ? 'pb-neg' : 'pb-zero';
      const sign = b > 0.005 ? '+' : '';

      // Anteil in % an den Gesamtausgaben
      const sharePct = totalShare > 0 ? (share[id] / totalShare * 100).toFixed(1) : '0.0';
      // Balken relativ zum höchsten Einzelanteil
      const barPct   = Math.min((share[id] / maxShare) * 100, 100);

      html += `<div class="person-balance">
        <div class="pb-name"><span class="pb-avatar">${u.avatarEmoji}</span>${u.name}</div>
        <div style="flex:1;margin:0 12px">
          <div class="pb-paid" style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:4px;">
            <span>💳 Bezahlt: <strong>CHF ${paid[id].toFixed(2)}</strong></span>
            <span>📊 Anteil: <strong>CHF ${share[id].toFixed(2)}</strong> <span style="color:var(--teal);font-weight:700">(${sharePct}%)</span></span>
          </div>
          <div class="balance-bar-wrap">
            <div class="balance-bar-bg">
              <div class="balance-bar-fill" style="width:${barPct}%;background:${b>0?'var(--green)':b<0?'var(--coral)':'var(--gray)'}"></div>
            </div>
          </div>
        </div>
        <div class="pb-balance ${cls}">${sign}CHF ${Math.abs(b).toFixed(2)}</div>
      </div>`;
    });
    html += '</div>';

    // Legende
    html += `<div class="card" style="font-size:0.78rem;color:var(--gray);line-height:1.7">
      <strong style="color:var(--blue);display:block;margin-bottom:4px">ℹ️ So wird gerechnet</strong>
      Jede Person trägt nur den Anteil der Ausgaben, bei denen sie als <em>betroffen</em> markiert war.
      Der Balken zeigt den Anteil relativ zur Person mit dem höchsten Einzelanteil.
      <br/><span style="color:var(--green)">■</span> = bekommt Geld zurück &nbsp;
      <span style="color:var(--coral)">■</span> = schuldet noch Geld &nbsp;
      <span style="color:var(--gray)">■</span> = ausgeglichen
    </div>`;

    html += `<h3 style="font-weight:700;margin:20px 0 10px;font-size:1rem;">💸 Wer zahlt wem?</h3>`;
    if (transactions.length === 0) {
      html += `<div class="card" style="text-align:center;color:var(--gray)">🎉 Alles ausgeglichen! Niemand schuldet etwas.</div>`;
    } else {
      transactions.forEach(t => {
        const from = users[t.from];
        const to   = users[t.to];
        if (!from || !to) return;
        html += `<div class="settlement-card">
          <span style="font-size:1.5rem">${from.avatarEmoji}</span>
          <div><div class="settlement-names"><strong>${from.name}</strong> <span>zahlt an</span> <strong>${to.name}</strong></div></div>
          <span style="font-size:1.5rem">${to.avatarEmoji}</span>
          <div class="s-amount">CHF ${t.amount.toFixed(2)}</div>
        </div>`;
      });
    }
    el.innerHTML = html;
  }

  // ─── HELPERS ──────────────────────────────────────────────
  window.openModal  = id => document.getElementById(id).classList.add('open');
  window.closeModal = id => document.getElementById(id).classList.remove('open');

  document.querySelectorAll('.modal-overlay').forEach(overlay => {
    overlay.addEventListener('click', e => {
      if (e.target === overlay) overlay.classList.remove('open');
    });
  });

  let toastTimer;
  window.showToast = function(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
  };

  // renderSettlement global machen
  window.renderSettlement = renderSettlement;

</script>
